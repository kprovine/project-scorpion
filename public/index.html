<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Scorpion</title>

 <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
  }

  header {
    height: 70px;
    background: #121821;
    border-bottom: 1px solid #1f2937;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 24px;

    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .menu {
    color: #94a3b8;
    font-size: 14px;
  }

  .grid {
    padding: 24px;

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  /* =========================
     CARD
  ========================= */
  .card {
    background: #121821;
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 18px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.15s ease,
                border-color 0.15s ease,
                opacity 0.3s ease;
    contain: layout paint;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: #334155;
  }

  .card h3 {
    margin-top: 0;
    margin-bottom: 18px;
    font-size: 18px;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 12px;
  }

  /* =========================
     ITEMS
  ========================= */
  .item {
  padding: 12px 0;
  border-bottom: 1px solid #1e293b;
  line-height: 1.4;
  cursor: pointer;

  opacity: 0;
  transform: translateY(6px);

  transition: opacity 0.25s ease, transform 0.25s ease;
  will-change: opacity, transform;
}

  .item.show {
  opacity: 1;
  transform: translateY(0);
}

  .item:last-child {
    border-bottom: none;
  }

  .rank {
    color: #64748b;
    font-size: 13px;
    margin-right: 8px;
  }

  .hot {
    color: #f97316;
    font-size: 11px;
    font-weight: bold;
    margin-left: 8px;
  }

  .timestamp {
    margin-top: 6px;
    color: #64748b;
    font-size: 11px;
  }

  .new {
  color: #ef4444;
  font-size: 11px;
  font-weight: 700;
  margin-left: 8px;
  letter-spacing: 0.5px;
}

  .item a {
    display: inline-block;
    color: inherit;
    text-decoration: none;
    transition: 0.15s ease;
  }

  .item a:hover {
    text-decoration: underline;
    color: #60a5fa;
  }

  .item.new-flash {
  box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.35),
              0 0 18px rgba(239, 68, 68, 0.25);
  background: rgba(239, 68, 68, 0.06);
}

  /* =========================
     SKELETON LOADING
  ========================= */
  .skeleton {
    opacity: 0.7;
  }

.skeleton-line {
  height: 10px;
  background: linear-gradient(90deg, #1e293b, #334155, #1e293b);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  margin-bottom: 8px;
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.skeleton-line.short {
  width: 60%;
}

.skeleton-line.long {
  width: 80%;
}
/* subtle pulse animation */
.skeleton-line::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  height: 100%;
  width: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

 @keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}


/* ---------------------------
   SKELETON LOADING STATE
---------------------------- */

.skeleton-item {
  height: 18px;
  margin: 10px 0;
  width: 100%;
  border-radius: 6px;
  background: #1e293b;
  position: relative;
  overflow: hidden;
}

/* shimmer effect */
.skeleton-item::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

/* smooth fade for Top Stories swap */
.fade-out {
  opacity: 0;
  transition: opacity 0.2s ease;
}

.fade-in {
  opacity: 1;
  transition: opacity 0.25s ease;
}

.live-indicator {
  color: #22c55e;
  font-weight: 600;
  margin-left: 6px;
  position: relative;
  animation: livePulse 1.6s ease-in-out infinite;
}

@keyframes livePulse {
  0% {
    opacity: 0.4;
    text-shadow: 0 0 0 rgba(34, 197, 94, 0);
  }
  50% {
    opacity: 1;
    text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
  }
  100% {
    opacity: 0.4;
    text-shadow: 0 0 0 rgba(34, 197, 94, 0);
  }
}

</style>

</head>

<body>

  <header>
  <div class="logo">Project Scorpion</div>
  <div class="menu">
  Dashboard MVP <span class="live-indicator">● LIVE</span>
</div>
</header>

  <div class="grid" id="dashboard"></div>

<script src="sources.js" defer></script>
<script src="main.js" defer></script>


</body>
</html>
