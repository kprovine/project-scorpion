<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Scorpion</title>

 <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
  }

  header {
    height: 70px;
    background: #121821;
    border-bottom: 1px solid #1f2937;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 24px;

    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .menu {
    color: #94a3b8;
    font-size: 14px;
  }

  .grid {
    padding: 24px;

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  /* =========================
     CARD
  ========================= */
  .card {
    background: #121821;
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 18px;
    min-height: 200px;
    height: fit-content;

    transition: transform 0.15s ease,
                border-color 0.15s ease,
                opacity 0.3s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: #334155;
  }

  .card h3 {
    margin-top: 0;
    margin-bottom: 18px;
    font-size: 18px;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 12px;
  }

  /* =========================
     ITEMS
  ========================= */
  .item {
    padding: 12px 0;
    border-bottom: 1px solid #1e293b;
    line-height: 1.4;
    cursor: pointer;

    opacity: 0;
    transform: translateY(8px);

    transition: transform 0.25s ease, opacity 0.25s ease;
    will-change: transform, opacity;
    transform-origin: top;
  }

  .item.show {
  opacity: 1;
  transform: translateY(0);
}

  .item:last-child {
    border-bottom: none;
  }

  .rank {
    color: #64748b;
    font-size: 13px;
    margin-right: 8px;
  }

  .hot {
    color: #f97316;
    font-size: 11px;
    font-weight: bold;
    margin-left: 8px;
  }

  .timestamp {
    margin-top: 6px;
    color: #64748b;
    font-size: 11px;
  }

  .new {
  color: #ef4444;
  font-size: 11px;
  font-weight: 700;
  margin-left: 8px;
  letter-spacing: 0.5px;
}

  .item a {
    display: inline-block;
    color: inherit;
    text-decoration: none;
    transition: 0.15s ease;
  }

  .item a:hover {
    text-decoration: underline;
    color: #60a5fa;
  }

  .item.new-flash {
  box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.35),
              0 0 18px rgba(239, 68, 68, 0.25);
  background: rgba(239, 68, 68, 0.06);
}

  /* =========================
     SKELETON LOADING
  ========================= */
  .skeleton {
    opacity: 0.7;
  }

.skeleton-line {
  height: 10px;
  background: linear-gradient(90deg, #1e293b, #334155, #1e293b);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  margin-bottom: 8px;
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.skeleton-line.short {
  width: 60%;
}

.skeleton-line.long {
  width: 80%;
}
/* subtle pulse animation */
.skeleton-line::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  height: 100%;
  width: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

 @keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}


/* ---------------------------
   SKELETON LOADING STATE
---------------------------- */

.skeleton-item {
  height: 18px;
  margin: 10px 0;
  width: 100%;
  border-radius: 6px;
  background: #1e293b;
  position: relative;
  overflow: hidden;
}

/* shimmer effect */
.skeleton-item::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

/* smooth fade for Top Stories swap */
.fade-out {
  opacity: 0;
  transition: opacity 0.2s ease;
}

.fade-in {
  opacity: 1;
  transition: opacity 0.25s ease;
}

.live-indicator {
  color: #22c55e;
  font-weight: 600;
  margin-left: 6px;
  position: relative;
  animation: livePulse 1.6s ease-in-out infinite;
}

@keyframes livePulse {
  0% {
    opacity: 0.4;
    text-shadow: 0 0 0 rgba(34, 197, 94, 0);
  }
  50% {
    opacity: 1;
    text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
  }
  100% {
    opacity: 0.4;
    text-shadow: 0 0 0 rgba(34, 197, 94, 0);
  }
}

</style>

</head>

<body>

  <header>
  <div class="logo">Project Scorpion</div>
  <div class="menu">
  Dashboard MVP <span class="live-indicator">● LIVE</span>
</div>
</header>

  <div class="grid" id="dashboard"></div>

<script>

let globalStories = [];

let storyMap = new Map();

let itemState = {};

const categories = [

  {
    id: "sports",
    title: "Sports",
    rssUrl: "https://feeds.bbci.co.uk/sport/rss.xml"
  },

  {
    id: "gaming",
    title: "Gaming",
    rssUrl: "https://feeds.arstechnica.com/arstechnica/index"
  },

  {
    id: "markets",
    title: "Markets",
    rssUrl: "https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5EGSPC&region=US&lang=en-US"
  }

];


// 1. helpers

function createDashboard() {
  const dashboard = document.getElementById("dashboard");

  const globalCard = document.createElement("div");
  globalCard.className = "card";
  globalCard.id = "global";
  globalCard.innerHTML = "<h3>🔥 Top Stories</h3>";
  dashboard.appendChild(globalCard);

  categories.forEach(cat => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = cat.id;
    card.innerHTML = `<h3>${cat.title}</h3>`;
    dashboard.appendChild(card);
  });
}

function createItem(text, index, link = null, score = 0, isHot = false, isNew = false) {

  const div = document.createElement("div");
  div.className = "item";

  // force reflow-friendly stagger timing
  setTimeout(() => {
    div.classList.add("show");
  }, index * 40); // stagger effect

  const timestamp = new Date().toLocaleTimeString();

  const content = link
    ? `<a href="${link}" target="_blank" style="color:inherit; text-decoration:none;">${text}</a>`
    : text;

    div.innerHTML = `
    <span class="rank">#${index + 1}</span>
    ${content}
    ${isHot ? '<span class="hot">HOT</span>' : ''}
    ${isNew ? '<span class="new">NEW</span>' : ''}
    <div class="timestamp">${timestamp}</div>
  `;

  return div;
}

function renderCategory(category, items) {

  const container = document.getElementById(category.id);
  if (!container) return;

  container.innerHTML = `<h3>${category.title}</h3>`;

  if (!items || items.length === 0) {
    container.innerHTML += `
      <div style="color:#64748b;padding:10px 0;">
        No stories
      </div>
    `;
    return;
  }

  items.forEach((item, index) => {

    const el = createItem(
      item.title,
      index,
      item.link,
      item.score,
      item.isHot
    );

    container.appendChild(el);

    setTimeout(() => {
      el.classList.add("show");
    }, index * 60);

  });
}

function renderAllCategories(allData) {

  const grouped = {};

  allData.forEach(item => {
    if (!grouped[item.category]) {
      grouped[item.category] = [];
    }
    grouped[item.category].push(item);
  });

  categories.forEach(cat => {
    renderCategory(cat, grouped[cat.id] || []);
  });
}

function renderGlobalFeed() {
  const container = document.getElementById("global");
  if (!container) return;

  // fade OUT old skeleton or old content (very subtle)
  container.style.opacity = 0.6;

  setTimeout(() => {
    container.innerHTML = "<h3>🔥 Top Stories</h3>";

    const top = globalStories
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);

    top.forEach((item, index) => {

      const id = `global:${normalizeTitle(item.title)}`;
      const state = getItemState(id);

      const isNew = (Date.now() - state.firstSeen) < 10 * 60 * 1000;

      const el = createItem(
        `[${item.category}] ${item.title}`,
        index,
        item.link,
        item.score,
        index < 3,
        isNew
      );

      container.appendChild(el);

      setTimeout(() => el.classList.add("show"), index * 40);
    });

    // fade back in
    container.style.opacity = 1;

  }, 80);
}

function streamGlobalFeed() {
  const container = document.getElementById("global");
  if (!container) return;

  const top = globalStories
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  top.forEach((item, index) => {

    const id = `global:${normalizeTitle(item.title)}`;
    const state = getItemState(id);

    // skip if already rendered
    if (state.renderedGlobal) return;
    state.renderedGlobal = true;

    // NEW logic per item
    const isNew = (Date.now() - state.firstSeen) < 10 * 60 * 1000;

    const el = createItem(
      `[${item.category}] ${item.title}`,
      index,
      item.link,
      item.score,
      index < 3,
      isNew
    );

    el.style.opacity = 0;
    el.style.transform = "translateY(10px)";

    container.insertBefore(el, container.children[1] || null);

    // glow flash (attention)
    requestAnimationFrame(() => {
    el.classList.add("new-flash");
    });

    // remove glow after 5s
    setTimeout(() => {
    el.classList.remove("new-flash");
    }, 5000);

    setTimeout(() => {
      el.classList.add("show");
    }, 20);
  });
}

function streamCategories() {

  categories.forEach(cat => {

    const container = document.getElementById(cat.id);
    if (!container) return;

    const items = globalStories
      .filter(i => i.category === cat.id)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);

    // Save positions BEFORE insert
    const oldPositions = new Map();

    Array.from(container.children).forEach(el => {
      if (!el.classList.contains("item")) return;
      oldPositions.set(el, el.getBoundingClientRect().top);
    });

    // Insert new stories
    items.forEach((item, index) => {

      const id = `${cat.id}:${normalizeTitle(item.title)}`;
      const state = getItemState(id);

      if (state.renderedCategories[cat.id]) return;

      state.renderedCategories[cat.id] = true;

      const isNew =
        (Date.now() - state.firstSeen) < 10 * 60 * 1000;

      const el = createItem(
        item.title,
        index,
        item.link,
        item.score,
        item.isHot,
        isNew
      );

      el.style.opacity = 0;

      const header = container.querySelector("h3");

      container.insertBefore(
        el,
        header ? header.nextSibling : container.firstChild
      );

      requestAnimationFrame(() => {
        el.classList.add("new-flash");
      });

      setTimeout(() => {
        el.classList.remove("new-flash");
      }, 5000);

      setTimeout(() => {
        el.classList.add("show");
      }, 20);
    });

    // Animate old items moving down
    requestAnimationFrame(() => {

      Array.from(container.children).forEach(el => {

        if (!el.classList.contains("item")) return;

        const oldTop = oldPositions.get(el);

        if (oldTop == null) return;

        const newTop = el.getBoundingClientRect().top;

        const delta = oldTop - newTop;

        if (!delta) return;

        el.style.transform = `translateY(${delta}px)`;

        requestAnimationFrame(() => {
          el.style.transition =
            "transform 400ms cubic-bezier(0.2,0.8,0.2,1)";
          el.style.transform = "";
        });

      });

    });

  });

}

function renderSkeleton(categoryId) {
  const container = document.getElementById(categoryId);
  if (!container) return;

  container.innerHTML = `<h3>Loading...</h3>`;

  for (let i = 0; i < 6; i++) {
    const skeleton = document.createElement("div");
    skeleton.className = "item skeleton";

    skeleton.innerHTML = `
      <span class="rank">#</span>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    `;

    container.appendChild(skeleton);
  }
}

function renderTopStoriesSkeleton() {
  let container = document.getElementById("global");

  if (!container) {
    const dashboard = document.getElementById("dashboard");
    container = document.createElement("div");
    container.className = "card";
    container.id = "global";
    container.innerHTML = "<h3>🔥 Top Stories</h3>";
    dashboard.prepend(container);
  }

  container.innerHTML = "<h3>🔥 Top Stories</h3>";

  for (let i = 0; i < 8; i++) {
    const skeleton = document.createElement("div");
    skeleton.className = "skeleton-item";
    container.appendChild(skeleton);
  }
}

// 2. scoring + utils

function scoreHeadline(title) {

  const lower = title.toLowerCase();

  // 1. keyword signal
  const keywords = [
    "breaking", "win", "beats", "shock",
    "massive", "update", "deal", "record"
  ];

  let score = 0;

  for (const word of keywords) {
    if (lower.includes(word)) score += 2;
  }

  // 2. urgency signal (caps / intensity)
  if (title === title.toUpperCase() && title.length > 10) {
    score += 2;
  }

  // 3. length signal (very short = often noise, medium = best)
  if (title.length > 40 && title.length < 120) {
    score += 2;
  }

  // 4. entity signal (simple heuristic)
  if (/[A-Z][a-z]+/.test(title)) {
    score += 1;
  }

  // 5. novelty bonus (random small jitter so feeds don’t feel static)
  score += Math.random() * 0.5;

  return score;
}

function normalizeTitle(title) {
  return title
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getItemState(id) {
  if (!itemState[id]) {
    itemState[id] = {
      renderedGlobal: false,
      renderedCategories: {},
      firstSeen: Date.now()
    };
  }
  return itemState[id];
}

// 3. data layer

async function loadRSSFeed(category) {

  const url = `/api/rss?url=${encodeURIComponent(category.rssUrl)}`;

  try {

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("RSS proxy failed: " + res.status);
    }

    const data = await res.json();
    const xmlText = data.xml;

    // -------------------------
    // SINGLE ROBUST GUARD
    // -------------------------
   if (!xmlText || typeof xmlText !== "string") {
  console.warn("Bad RSS payload:", xmlText);
  return [];
}

if (!xmlText.includes("<item")) {
  console.warn("No RSS items found for:", category.id);
  return [];
}

const parser = new DOMParser();
const xml = parser.parseFromString(xmlText, "text/xml");

const items = Array.from(xml.getElementsByTagName("item"));

console.log("ITEM COUNT:", items.length);

  let cleaned = items
  .map(item => {
    const title = item.querySelector("title")?.textContent || "";
    const link = item.querySelector("link")?.textContent || "";

    return {
      title,
      link,
      score: scoreHeadline(title),
      category: category.id
    };
  })
  .filter(i => i.title && i.link);

    cleaned.sort((a, b) => b.score - a.score);
    cleaned = cleaned.slice(0, 10);

    const hotCutoff = Math.max(1, Math.floor(cleaned.length * 0.3));

    cleaned = cleaned.map((item, index) => ({
      ...item,
      isHot: index < hotCutoff
    }));

    // -------------------------
    // DEDUP STEP (GLOBAL MERGE)
    // -------------------------
    cleaned.forEach(item => {

      const key = normalizeTitle(item.title);

      if (!storyMap.has(key)) {
        storyMap.set(key, item);
      } else {
        const existing = storyMap.get(key);

        if (item.score > existing.score) {
          storyMap.set(key, {
            ...existing,
            ...item,
            score: item.score
          });
        }
      }
    });

    return cleaned;

  } catch (err) {

    console.error(`${category.id} error:`, err);
    return [];
  }
}

// 4. boot

document.addEventListener("DOMContentLoaded", async () => {

  storyMap = new Map();
  globalStories = [];

  createDashboard();

  renderTopStoriesSkeleton?.();
  categories.forEach(cat => renderSkeleton(cat.id));

  await Promise.all(categories.map(loadRSSFeed));

  globalStories = Array.from(storyMap.values());

  renderAllCategories(globalStories);
  renderGlobalFeed();

  setInterval(() => {
    streamGlobalFeed();
    streamCategories();
  }, 60000);
});

</script>

</body>
</html>
