<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Scorpion</title>

 <style>

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
  }

  header {
  height: 70px;
  background: #121821;
  border-bottom: 1px solid #1f2937;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 24px;

  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

  .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .menu {
    color: #94a3b8;
    font-size: 14px;
  }

  .grid {
    padding: 24px;

    display: grid;

    grid-template-columns:
      repeat(auto-fit, minmax(320px, 1fr));

    gap: 20px;
  }

  .card {
    background: #121821;

    border: 1px solid #1e293b;

    border-radius: 14px;

    padding: 18px;

    transition: 0.2s ease;

    min-height: 500px;

    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .card:hover {
    transform: translateY(-2px);

    border-color: #334155;
  }

  .card h3 {
    margin-top: 0;

    margin-bottom: 18px;

    font-size: 18px;

    border-bottom: 1px solid #1e293b;

    padding-bottom: 12px;
  }

  .item {
    padding: 12px 0;

    border-bottom: 1px solid #1e293b;

    line-height: 1.4;
  }

  .item:last-child {
    border-bottom: none;
  }

  .rank {
    color: #64748b;

    font-size: 13px;

    margin-right: 8px;
  }

  .hot {
    color: #f97316;

    font-size: 11px;

    font-weight: bold;

    margin-left: 8px;
  }

  .timestamp {
    margin-top: 6px;

    color: #64748b;

    font-size: 11px;
  }

  .item a {
  display: inline-block;
  transition: 0.15s ease;
  color: inherit;
  text-decoration: none;
}

.item a:hover {
  text-decoration: underline;
  color: #60a5fa;
}

.item {
  cursor: pointer;
}

</style>
</head>

<body>

  <header>
  <div class="logo">Project Scorpion</div>
  <div class="menu">Dashboard MVP <span style="color:#22c55e;">● LIVE</span></div>
</header>

  <div class="grid" id="dashboard"></div>

<script>

let globalStories = [];

let storyMap = new Map();

const categories = [

  {
    id: "sports",
    title: "Sports",
    rssUrl: "https://feeds.bbci.co.uk/sport/rss.xml"
  },

  {
    id: "gaming",
    title: "Gaming",
    rssUrl: "https://feeds.arstechnica.com/arstechnica/index"
  },

  {
    id: "markets",
    title: "Markets",
    rssUrl: "https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5EGSPC&region=US&lang=en-US"
  }

];


function createDashboard() {
  const dashboard = document.getElementById("dashboard");

  categories.forEach(cat => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = cat.id;
    card.innerHTML = `<h3>${cat.title}</h3>`;
    dashboard.appendChild(card);
  });
}

function createItem(text, index, link = null, score = 0, isHot = false) {

  const div = document.createElement("div");
  div.className = "item";

  const timestamp = new Date().toLocaleTimeString();

  const content = link
    ? `<a href="${link}" target="_blank" style="color:inherit; text-decoration:none;">
         ${text}
       </a>`
    : text;

  div.innerHTML = `
    <span class="rank">#${index + 1}</span>
    ${content}
    ${isHot ? '<span class="hot">HOT</span>' : ''}
    <div class="timestamp">${timestamp}</div>
  `;

  return div;
}

function renderCategory(category, items) {

  const container = document.getElementById(category.id);

  container.innerHTML = `<h3>${category.title}</h3>`;

  items.forEach((item, index) => {

    container.appendChild(
      createItem(
        item.title,
        index,
        item.link,
        item.score,
        item.isHot
      )
    );

  });
}

function renderAllCategories(allData) {

  const grouped = {};

  allData.forEach(item => {
    if (!grouped[item.category]) {
      grouped[item.category] = [];
    }
    grouped[item.category].push(item);
  });

  categories.forEach(cat => {
    renderCategory(cat, grouped[cat.id] || []);
  });
}

function renderGlobalFeed() {

  const dashboard = document.getElementById("dashboard");

  let container = document.getElementById("global");

  if (!container) {
    container = document.createElement("div");
    container.className = "card";
    container.id = "global";
    container.innerHTML = "<h3>🔥 Top Stories</h3>";
    dashboard.prepend(container);
  }

  container.innerHTML = "<h3>🔥 Top Stories</h3>";

  const top = globalStories
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  top.forEach((item, index) => {
    container.appendChild(
      createItem(
        `[${item.category}] ${item.title}`,
        index,
        item.link,
        item.score,
        index < 3
      )
    );
  });
}

function scoreHeadline(title) {

  const lower = title.toLowerCase();

  // 1. keyword signal
  const keywords = [
    "breaking", "win", "beats", "shock",
    "massive", "update", "deal", "record"
  ];

  let score = 0;

  for (const word of keywords) {
    if (lower.includes(word)) score += 2;
  }

  // 2. urgency signal (caps / intensity)
  if (title === title.toUpperCase() && title.length > 10) {
    score += 2;
  }

  // 3. length signal (very short = often noise, medium = best)
  if (title.length > 40 && title.length < 120) {
    score += 2;
  }

  // 4. entity signal (simple heuristic)
  if (/[A-Z][a-z]+/.test(title)) {
    score += 1;
  }

  // 5. novelty bonus (random small jitter so feeds don’t feel static)
  score += Math.random() * 0.5;

  return score;
}

function normalizeTitle(title) {
  return title
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

async function loadRSSFeed(category) {

  const url = `/api/rss?url=${encodeURIComponent(category.rssUrl)}`;

  try {

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("RSS proxy failed: " + res.status);
    }

    const xmlText = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const items = Array.from(xml.querySelectorAll("item"));

    let cleaned = items
      .map(item => {
        const title = item.querySelector("title")?.textContent || "";
        const link = item.querySelector("link")?.textContent || "";

        return {
          title,
          link,
          score: scoreHeadline(title),
          category: category.id
        };
      })
      .filter(i => i.title && i.link);

    cleaned.sort((a, b) => b.score - a.score);
    cleaned = cleaned.slice(0, 10);

    const hotCutoff = Math.max(1, Math.floor(cleaned.length * 0.3));

    cleaned = cleaned.map((item, index) => ({
      ...item,
      isHot: index < hotCutoff
    }));

    // -------------------------
    // DEDUP STEP (GLOBAL MERGE)
    // -------------------------
    cleaned.forEach(item => {

      const key = normalizeTitle(item.title);

      if (!storyMap.has(key)) {
        storyMap.set(key, item);
      } else {
        const existing = storyMap.get(key);

        // keep higher quality version
        if (item.score > existing.score) {
          storyMap.set(key, {
            ...existing,
            ...item,
            score: item.score
          });
        }
      }
    });

    return Array.from(storyMap.values());

  } catch (err) {

    console.error(`${category.title} error:`, err);

    return [];
  }
}

document.addEventListener("DOMContentLoaded", async () => {

  // 1. reset global state (IMPORTANT)
  storyMap = new Map();
  globalStories = [];

  // 2. build UI shell
  createDashboard();

  try {

    // 3. load all feeds (each feed contributes into storyMap)
    await Promise.all(
      categories.map(cat => loadRSSFeed(cat))
    );

    // 4. NOW build final dataset from deduped global map
    globalStories = Array.from(storyMap.values());

    // 5. render everything from ONE source of truth
    renderAllCategories(globalStories);
    renderGlobalFeed();

  } catch (err) {
    console.error("GLOBAL FAILURE:", err);
  }

});

</script>

</body>
</html>
