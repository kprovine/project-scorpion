<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Scorpion</title>

 <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
  }

  header {
    height: 70px;
    background: #121821;
    border-bottom: 1px solid #1f2937;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 24px;

    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .menu {
    color: #94a3b8;
    font-size: 14px;
  }

  .grid {
    padding: 24px;

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  /* =========================
     CARD
  ========================= */
  .card {
    background: #121821;
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 18px;
    min-height: 500px;

    transition: transform 0.15s ease,
                border-color 0.15s ease,
                opacity 0.3s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: #334155;
  }

  .card h3 {
    margin-top: 0;
    margin-bottom: 18px;
    font-size: 18px;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 12px;
  }

  /* =========================
     ITEMS
  ========================= */
  .item {
    padding: 12px 0;
    border-bottom: 1px solid #1e293b;
    line-height: 1.4;
    cursor: pointer;

    opacity: 0;
    transform: translateY(8px);

    transition: opacity 0.25s ease,
                transform 0.25s ease;
  }

  .item.show {
  opacity: 1;
  transform: translateY(0);
}

  .item:last-child {
    border-bottom: none;
  }

  .rank {
    color: #64748b;
    font-size: 13px;
    margin-right: 8px;
  }

  .hot {
    color: #f97316;
    font-size: 11px;
    font-weight: bold;
    margin-left: 8px;
  }

  .timestamp {
    margin-top: 6px;
    color: #64748b;
    font-size: 11px;
  }

  .item a {
    display: inline-block;
    color: inherit;
    text-decoration: none;
    transition: 0.15s ease;
  }

  .item a:hover {
    text-decoration: underline;
    color: #60a5fa;
  }

  /* =========================
     SKELETON LOADING
  ========================= */
  .skeleton {
    opacity: 0.7;
  }

  .skeleton-line {
  height: 10px;
  background: #1e293b;
  border-radius: 6px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}

  .skeleton-line.short {
  width: 40%;
}

.skeleton-line.long {
  width: 80%;
}
/* subtle pulse animation */
.skeleton-line::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  height: 100%;
  width: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

 @keyframes shimmer {
  100% {
    left: 100%;
  }
}

/* ---------------------------
   SKELETON LOADING STATE
---------------------------- */

.skeleton-item {
  height: 18px;
  margin: 10px 0;
  border-radius: 6px;
  background: #1e293b;
  position: relative;
  overflow: hidden;
}

/* shimmer effect */
.skeleton-item::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(0); }
  100% { transform: translateX(400px); }
}

/* smooth fade for Top Stories swap */
.fade-out {
  opacity: 0;
  transition: opacity 0.2s ease;
}

.fade-in {
  opacity: 1;
  transition: opacity 0.25s ease;
}

</style>

</head>

<body>

  <header>
  <div class="logo">Project Scorpion</div>
  <div class="menu">Dashboard MVP <span style="color:#22c55e;">● LIVE</span></div>
</header>

  <div class="grid" id="dashboard"></div>

<script>

let globalStories = [];

let storyMap = new Map();

let isLoading = true;

let renderedTopStories = new Set();

const categories = [

  {
    id: "sports",
    title: "Sports",
    rssUrl: "https://feeds.bbci.co.uk/sport/rss.xml"
  },

  {
    id: "gaming",
    title: "Gaming",
    rssUrl: "https://feeds.arstechnica.com/arstechnica/index"
  },

  {
    id: "markets",
    title: "Markets",
    rssUrl: "https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5EGSPC&region=US&lang=en-US"
  }

];

// 1. helpers

function createDashboard() {
  const dashboard = document.getElementById("dashboard");

  categories.forEach(cat => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = cat.id;

    card.innerHTML = `<h3>${cat.title}</h3>`;

for (let i = 0; i < 5; i++) {
      card.appendChild(createSkeletonItem());
    }

    dashboard.appendChild(card);
  });
}

function createItem(text, index, link = null, score = 0, isHot = false) {

  const div = document.createElement("div");
  div.className = "item";

  // force reflow-friendly stagger timing
  setTimeout(() => {
    div.classList.add("show");
  }, index * 40); // stagger effect

  const timestamp = new Date().toLocaleTimeString();

  const content = link
    ? `<a href="${link}" target="_blank" style="color:inherit; text-decoration:none;">
         ${text}
       </a>`
    : text;

  div.innerHTML = `
    <span class="rank">#${index + 1}</span>
    ${content}
    ${isHot ? '<span class="hot">HOT</span>' : ''}
    <div class="timestamp">${timestamp}</div>
  `;

  return div;
}

function createSkeletonItem() {
  const div = document.createElement("div");
  div.className = "item skeleton";

  div.innerHTML = `
    <div class="skeleton-line short"></div>
    <div class="skeleton-line long"></div>
  `;

  return div;
}

function renderCategory(category, items) {

  const container = document.getElementById(category.id);

  container.innerHTML = `<h3>${category.title}</h3>`;

  items.forEach((item, index) => {

    const el = createItem(
      item.title,
      index,
      item.link,
      item.score,
      item.isHot
    );

    container.appendChild(el);

    // stagger animation
    setTimeout(() => {
      el.classList.add("show");
    }, index * 60); // 60ms stagger
  });
}

function renderAllCategories(allData) {

  const grouped = {};

  allData.forEach(item => {
    if (!grouped[item.category]) {
      grouped[item.category] = [];
    }
    grouped[item.category].push(item);
  });

  categories.forEach(cat => {
    renderCategory(cat, grouped[cat.id] || []);
  });
}

function renderGlobalFeed() {
  const container = document.getElementById("global");
  if (!container) return;

  // fade OUT old skeleton or old content (very subtle)
  container.style.opacity = 0.6;

  setTimeout(() => {
    container.innerHTML = "<h3>🔥 Top Stories</h3>";

    const top = globalStories
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);

    top.forEach((item, index) => {
      const el = createItem(
        `[${item.category}] ${item.title}`,
        index,
        item.link,
        item.score,
        index < 3
      );

      container.appendChild(el);

      setTimeout(() => {
        el.classList.add("show");
      }, index * (30 + Math.random() * 30));
    });

    // fade back in
    container.style.opacity = 1;

  }, 80);
}

function streamGlobalFeed() {
  const container = document.getElementById("global");
  if (!container) return;

  const top = globalStories
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  top.forEach((item, index) => {
    const key = normalizeTitle(item.title);

    if (renderedTopStories.has(key)) return;

    renderedTopStories.add(key);

    const el = createItem(
      `[${item.category}] ${item.title}`,
      index,
      item.link,
      item.score,
      index < 3
    );

    el.style.opacity = 0;
    el.style.transform = "translateY(10px)";

    container.appendChild(el);

    setTimeout(() => {
      el.classList.add("show");
    }, 20);
  });
}

function renderSkeleton(categoryId) {
  const container = document.getElementById(categoryId);

  container.innerHTML = `<h3>Loading...</h3>`;

  for (let i = 0; i < 6; i++) {
    const skeleton = document.createElement("div");
    skeleton.className = "item skeleton";

    skeleton.innerHTML = `
      <span class="rank">#</span>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    `;

    container.appendChild(skeleton);
  }
}

function renderTopStoriesSkeleton() {
  let container = document.getElementById("global");

  if (!container) {
    const dashboard = document.getElementById("dashboard");
    container = document.createElement("div");
    container.className = "card";
    container.id = "global";
    container.innerHTML = "<h3>🔥 Top Stories</h3>";
    dashboard.prepend(container);
  }

  container.innerHTML = "<h3>🔥 Top Stories</h3>";

  for (let i = 0; i < 8; i++) {
    const skeleton = document.createElement("div");
    skeleton.className = "skeleton-item";
    container.appendChild(skeleton);
  }
}

// 2. scoring + utils

function scoreHeadline(title) {

  const lower = title.toLowerCase();

  // 1. keyword signal
  const keywords = [
    "breaking", "win", "beats", "shock",
    "massive", "update", "deal", "record"
  ];

  let score = 0;

  for (const word of keywords) {
    if (lower.includes(word)) score += 2;
  }

  // 2. urgency signal (caps / intensity)
  if (title === title.toUpperCase() && title.length > 10) {
    score += 2;
  }

  // 3. length signal (very short = often noise, medium = best)
  if (title.length > 40 && title.length < 120) {
    score += 2;
  }

  // 4. entity signal (simple heuristic)
  if (/[A-Z][a-z]+/.test(title)) {
    score += 1;
  }

  // 5. novelty bonus (random small jitter so feeds don’t feel static)
  score += Math.random() * 0.5;

  return score;
}

function normalizeTitle(title) {
  return title
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// 3. data layer

async function loadRSSFeed(category) {

  const url = `/api/rss?url=${encodeURIComponent(category.rssUrl)}`;

  try {

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("RSS proxy failed: " + res.status);
    }

    const data = await res.json();
    const xmlText = data.xml;

    // -------------------------
    // SINGLE ROBUST GUARD
    // -------------------------
   if (!xmlText || typeof xmlText !== "string") {
  console.warn("Bad RSS payload:", xmlText);
  return [];
}

if (!xmlText.includes("<item")) {
  console.warn("No RSS items found for:", category.id);
  return [];
}

const parser = new DOMParser();
const xml = parser.parseFromString(xmlText, "text/xml");

const items = Array.from(xml.getElementsByTagName("item"));

console.log("ITEM COUNT:", items.length);

  let cleaned = items
  .map(item => {
    const title = item.querySelector("title")?.textContent || "";
    const link = item.querySelector("link")?.textContent || "";

    return {
      title,
      link,
      score: scoreHeadline(title),
      category: category.id
    };
  })
  .filter(i => i.title && i.link);

    cleaned.sort((a, b) => b.score - a.score);
    cleaned = cleaned.slice(0, 10);

    const hotCutoff = Math.max(1, Math.floor(cleaned.length * 0.3));

    cleaned = cleaned.map((item, index) => ({
      ...item,
      isHot: index < hotCutoff
    }));

    // -------------------------
    // DEDUP STEP (GLOBAL MERGE)
    // -------------------------
    cleaned.forEach(item => {

      const key = normalizeTitle(item.title);

      if (!storyMap.has(key)) {
        storyMap.set(key, item);
      } else {
        const existing = storyMap.get(key);

        if (item.score > existing.score) {
          storyMap.set(key, {
            ...existing,
            ...item,
            score: item.score
          });
        }
      }
    });

    return cleaned;

  } catch (err) {

    console.error(`${category.id} error:`, err);
    return [];
  }
}

// 4. boot

document.addEventListener("DOMContentLoaded", async () => {

  // reset state
  storyMap = new Map();
  globalStories = [];

  // build UI shell
  createDashboard();

  // show skeletons
  renderTopStoriesSkeleton();
  categories.forEach(cat => renderSkeleton(cat.id));

  try {

    // fetch data
    await Promise.all(
      categories.map(cat => loadRSSFeed(cat))
    );

    // build final dataset
    globalStories = Array.from(storyMap.values());

    // IMPORTANT: clear skeletons implicitly by full render
    renderAllCategories(globalStories);
    renderGlobalFeed();

    // start streaming updates
    setInterval(() => {
      streamGlobalFeed();
    }, 60000);

  } catch (err) {
    console.error("GLOBAL FAILURE:", err);
  }

});

</script>

</body>
</html>
