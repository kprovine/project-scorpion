<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Scorpion</title>

 <style>

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
  }

  header {
  height: 70px;
  background: #121821;
  border-bottom: 1px solid #1f2937;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 24px;

  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

  .logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .menu {
    color: #94a3b8;
    font-size: 14px;
  }

  .grid {
    padding: 24px;

    display: grid;

    grid-template-columns:
      repeat(auto-fit, minmax(320px, 1fr));

    gap: 20px;
  }

  .card {
    background: #121821;

    border: 1px solid #1e293b;

    border-radius: 14px;

    padding: 18px;

    transition: 0.2s ease;

    min-height: 500px;

    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .card:hover {
    transform: translateY(-2px);

    border-color: #334155;
  }

  .card h3 {
    margin-top: 0;

    margin-bottom: 18px;

    font-size: 18px;

    border-bottom: 1px solid #1e293b;

    padding-bottom: 12px;
  }

  .item {
    padding: 12px 0;

    border-bottom: 1px solid #1e293b;

    line-height: 1.4;
  }

  .item:last-child {
    border-bottom: none;
  }

  .rank {
    color: #64748b;

    font-size: 13px;

    margin-right: 8px;
  }

  .hot {
    color: #f97316;

    font-size: 11px;

    font-weight: bold;

    margin-left: 8px;
  }

  .timestamp {
    margin-top: 6px;

    color: #64748b;

    font-size: 11px;
  }

  .item a {
  display: inline-block;
  transition: 0.15s ease;
  color: inherit;
  text-decoration: none;
}

.item a:hover {
  text-decoration: underline;
  color: #60a5fa;
}

.item {
  cursor: pointer;
}

</style>
</head>

<body>

  <header>
  <div class="logo">Project Scorpion</div>
  <div class="menu">Dashboard MVP <span style="color:#22c55e;">● LIVE</span></div>
</header>

  <div class="grid" id="dashboard"></div>

<script>

const categories = [

  {
    id: "sports",
    title: "Sports",
    rssUrl: "https://feeds.bbci.co.uk/sport/rss.xml"
  },

  {
    id: "gaming",
    title: "Gaming",
    rssUrl: "https://feeds.arstechnica.com/arstechnica/index"
  },

  {
    id: "markets",
    title: "Markets",
    rssUrl:
      "https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5EGSPC&region=US&lang=en-US"
  }

];


  function createDashboard() {
    const dashboard = document.getElementById("dashboard");

    categories.forEach(cat => {
      const card = document.createElement("div");
      card.className = "card";
      card.id = cat.id;

      card.innerHTML = `<h3>${cat.title}</h3>`;
      dashboard.appendChild(card);
    });
  }

  function createItem(text, index, link = null) {

  const div = document.createElement("div");
  div.className = "item";

  const isHot = index < 3;
  const timestamp = new Date().toLocaleTimeString();

  const content = link
    ? `<a href="${link}" target="_blank" style="color:inherit; text-decoration:none;">
         ${text}
       </a>`
    : text;

  div.innerHTML = `
    <span class="rank">#${index + 1}</span>
    ${content}
    ${isHot ? '<span class="hot">HOT</span>' : ''}
    <div class="timestamp">${timestamp}</div>
  `;

  return div;
}

function renderCategory(category, items) {

  const container = document.getElementById(category.id);

  container.innerHTML = `<h3>${category.title}</h3>`;

  items.forEach((item, index) => {

    container.appendChild(
      createItem(
        item.title,
        index,
        item.link
      )
    );

  });
}


function init() {

  createDashboard();

  categories.forEach(cat => {
    loadRSSFeed(cat);
  });

}

async function loadRSSFeed(category) {

  const container = document.getElementById(category.id);

  container.innerHTML = `
    <h3>${category.title}</h3>
    <div class="item">Loading latest news...</div>
  `;

  const proxy =
    "https://api.allorigins.win/get?url=" +
    encodeURIComponent(category.rssUrl);

  try {

    const res = await fetch(proxy);
    const data = await res.json();

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");

    const items = Array.from(xml.querySelectorAll("item"));

    const cleaned = items
      .map(item => ({
        title: item.querySelector("title")?.textContent,
        link: item.querySelector("link")?.textContent
      }))
      .filter(i => i.title && i.link)
      .slice(0, 10);

    renderCategory(category, cleaned);

  } catch (err) {

    console.error(`${category.title} error:`, err);

    container.innerHTML = `
      <h3>${category.title}</h3>
      <div class="item">Failed to load feed</div>
    `;
  }
}

  init();

</script>

</body>
</html>
